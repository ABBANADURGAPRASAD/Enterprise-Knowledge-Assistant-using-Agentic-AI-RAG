spring:
  application:
    name: enterprise-knowledge-assistant
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/eka_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:eka_user}
    password: ${DB_PASSWORD:eka_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST:localhost}
          port: ${CHROMA_PORT:8000}
        collection-name: eka-documents
        initialize-schema: true

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

eka:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-long-enough}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  rag:
    chunk-size: 1000
    chunk-overlap: 200
    top-k: 5
    rerank-top-k: 3
  security:
    rate-limit:
      chat-requests-per-minute: 60
  vector-store:
    provider: chroma

logging:
  level:
    com.enterprise.eka: INFO
    org.springframework.ai: DEBUG
